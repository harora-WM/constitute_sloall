data_sources:
  java_stats_api:
    type: rest_api
    description: "Real-time metrics and statistics from Java services"
    capabilities:
      - current_metrics
      - service_health
      - performance_data
      - resource_usage
    timeout: 30
    retry_attempts: 3

  postgres:
    type: database
    description: "SLO definitions, alerts, incidents, and change history"
    capabilities:
      - slo_definitions
      - alert_history
      - incident_tracking
      - change_log
      - configuration_history
    pool_size: 10
    connection_timeout: 10

  clickhouse:
    type: analytical_database
    description: "Historical data, trends, patterns, and AI memory"
    capabilities:
      - trend_analysis
      - pattern_detection
      - historical_comparison
      - ai_insights
      - similarity_search
      - incident_memory
    pool_size: 5
    compression: true

  clickhouse_infra:
    type: analytical_database
    description: "Host-level infrastructure metrics (CPU, memory, disk) from dedicated ClickHouse table, collected by SolarWinds and Zabbix"
    capabilities:
      - cpu_metrics
      - memory_metrics
      - disk_metrics
      - resource_trend
    pool_size: 5
    compression: true

  golden_path_api:
    type: rest_api
    description: "Top-5 quadrant EB transactions — identifies critical business paths with highest error-budget consumption"
    capabilities:
      - critical_path_analysis
      - error_budget_quadrant
      - top_impacted_transactions
    timeout: 30
    retry_attempts: 3

  journey_health_api:
    type: rest_api
    description: "User journey performance data — end-to-end health of multi-step business flows"
    capabilities:
      - journey_success_rate
      - journey_latency
      - flow_health_status
      - user_experience_metrics
    timeout: 30
    retry_attempts: 3

  opensearch:
    type: search_engine
    description: "Logs, traces, and full-text search"
    capabilities:
      - log_search
      - trace_analysis
      - error_patterns
      - audit_trail
    index_patterns:
      - logs-*
      - traces-*
      - audit-*
    timeout: 60

# Intent to data source mapping
intent_data_sources:
  STATE:
    - java_stats_api
    - postgres

  TREND:
    - java_stats_api
    - clickhouse

  PATTERN:
    - clickhouse

  CAUSE:
    - java_stats_api
    - opensearch
    - postgres
    - clickhouse

  IMPACT:
    - java_stats_api
    - clickhouse
    - golden_path_api
    - journey_health_api

  ACTION:
    - clickhouse
    - postgres

  PREDICT:
    - clickhouse
    - java_stats_api

  OPTIMIZE:
    - java_stats_api
    - opensearch
    - postgres

  EVIDENCE:
    - opensearch
    - postgres
    - clickhouse

  INFRA:
    - clickhouse_infra
