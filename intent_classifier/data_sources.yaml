data_sources:
  java_stats_api:
    type: rest_api
    description: "Real-time metrics and statistics from Java services"
    capabilities:
      - current_metrics
      - service_health
      - performance_data
      - resource_usage
    timeout: 30
    retry_attempts: 3

  postgres:
    type: database
    description: "SLO definitions, alerts, incidents, and change history"
    capabilities:
      - slo_definitions
      - alert_history
      - incident_tracking
      - change_log
      - configuration_history
    pool_size: 10
    connection_timeout: 10

  clickhouse:
    type: analytical_database
    description: "Historical data, trends, patterns, and AI memory"
    capabilities:
      - trend_analysis
      - pattern_detection
      - historical_comparison
      - ai_insights
      - similarity_search
      - incident_memory
    pool_size: 5
    compression: true

  # DISABLED: clickhouse_infra
  # clickhouse_infra:
  #   type: analytical_database
  #   description: "Host-level infrastructure metrics (CPU, memory, disk) from dedicated ClickHouse table, collected by SolarWinds and Zabbix"
  #   capabilities:
  #     - cpu_metrics
  #     - memory_metrics
  #     - disk_metrics
  #     - resource_trend
  #   pool_size: 5
  #   compression: true

  # DISABLED: alerts_count
  # alerts_count:
  #   type: rest_api
  #   description: "Alert action counts (open/closed/reoccurring) for the query time window"
  #   capabilities:
  #     - alert_count
  #     - incident_signals
  #   timeout: 30
  #   retry_attempts: 3

  change_impact:
    type: rest_api
    description: "Latest deployment change and top-5 EB/RESPONSE deviations pre/post release"
    capabilities:
      - deployment_impact
      - pre_post_deviation
      - change_correlation
    timeout: 30
    retry_attempts: 3

  opensearch:
    type: search_engine
    description: "Logs, traces, and full-text search"
    capabilities:
      - log_search
      - trace_analysis
      - error_patterns
      - audit_trail
    index_patterns:
      - logs-*
      - traces-*
      - audit-*
    timeout: 60

# Intent to data source mapping
intent_data_sources:
  STATE:
    - java_stats_api
    - postgres
    # - alerts_count  # DISABLED

  TREND:
    - java_stats_api
    - clickhouse

  PATTERN:
    - clickhouse

  CAUSE:
    - java_stats_api
    - opensearch
    - postgres
    - clickhouse
    # - alerts_count  # DISABLED
    - change_impact

  IMPACT:
    - java_stats_api
    - clickhouse
    # - alerts_count  # DISABLED

  ACTION:
    - clickhouse
    - postgres

  PREDICT:
    - clickhouse
    - java_stats_api

  OPTIMIZE:
    - java_stats_api
    - opensearch
    - postgres

  EVIDENCE:
    - opensearch
    - postgres
    - clickhouse
    - change_impact

  # DISABLED: INFRA
  # INFRA:
  #   - clickhouse_infra
